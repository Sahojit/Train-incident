services:
  # ── Streamlit Dashboard ───────────────────────────────────────────────────
  - type: web
    name: traffic-dashboard
    runtime: python
    buildCommand: pip install -r requirements-render.txt
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ANTHROPIC_API_KEY
        sync: false          # set this in Render dashboard → Environment
    healthCheckPath: /healthz

  # ── FastAPI ───────────────────────────────────────────────────────────────
  - type: web
    name: traffic-api
    runtime: python
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /health
