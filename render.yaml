services:
  # ── Streamlit Dashboard ───────────────────────────────────────────────────
  - type: web
    name: traffic-dashboard
    runtime: python
    buildCommand: pip install -r requirements-render.txt && mkdir -p models && [ -f traffic-bdd100k/models/best_model.pth ] && cp traffic-bdd100k/models/best_model.pth models/best_vision_model.pt || true
    startCommand: streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /_stcore/health

  # ── FastAPI ───────────────────────────────────────────────────────────────
  - type: web
    name: traffic-api
    runtime: python
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ANTHROPIC_API_KEY
        sync: false
    healthCheckPath: /health
